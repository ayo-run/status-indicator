<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>status-indicator web component demo</title>
    <link rel="stylesheet" href="./pico.min.css">
    <script type="module" src="./src/status-indicator.ts"></script>
    <style>
        html, body {
            height: 100%
        }
        body {
            display: grid;
            place-content: safe center;
        }
        main {
            padding: 1em;
        }

        status-indicator {
            font-family: 'Courier New', Courier, monospace;
        }
        </style>
</head>
<body>
    <header>
        <h1>&lt;status-indicator&gt;</h1>
        <p>
            <a href="https://git.ayo.run/ayo/status-indicator">Ayo's Forge</a> &middot;
            <a href="https://github.com/ayo-run/status-indicator">GitHub</a> &middot;
            <a href="https://git.sr.ht/~ayoayco/status-indicator">SourceHut</a>
        </p>
    </header>
    <main>
        <status-indicator status="positive" pulse>
            All systems operational
        </status-indicator>
        <br />
        <status-indicator status="negative" pulse>
            Something's wrong
        </status-indicator>
        <br />
        <status-indicator status="active">
            It's just fine; carry on
        </status-indicator>
        <br />
        <status-indicator>
            Nothing matters
        </status-indicator>
        <br />
        <status-indicator status="intermediary">
            Slow down...
        </status-indicator>
    </main>
    <footer>
        <hr />
        <p>
            Just keep building.
            <br>
            A web component by <a href="https://ayo.ayco.io">Ayo</a>.
        </p>
    </footer>
</body>
</html>
